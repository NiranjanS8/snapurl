name: Backend CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - ".mvn/**"
      - "mvnw"
      - "mvnw.cmd"
      - "pom.xml"
      - "Dockerfile"
      - "docker-compose.aws.yml"
      - ".github/workflows/backend-ci-cd.yml"
      - "BACKEND_CICD.md"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - ".mvn/**"
      - "mvnw"
      - "mvnw.cmd"
      - "pom.xml"
      - "Dockerfile"
      - "docker-compose.aws.yml"
      - ".github/workflows/backend-ci-cd.yml"
      - "BACKEND_CICD.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run Maven tests
        run: ./mvnw test

  deploy:
    name: Deploy Backend To EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: EC2_APP_DIR,DEPLOY_BRANCH
          script: |
            set -euo pipefail

            APP_DIR="${EC2_APP_DIR:-}"
            BRANCH="${DEPLOY_BRANCH:-main}"

            if [ -z "$APP_DIR" ]; then
              echo "Missing app directory. Set EC2_APP_DIR secret."
              exit 1
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Git repository not found at: $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"

            if [ ! -f ".env.aws" ]; then
              echo ".env.aws is missing in $APP_DIR"
              exit 1
            fi

            mkdir -p "$APP_DIR/logs"
            mkdir -p "$APP_DIR/monitoring/prometheus"
            mkdir -p "$APP_DIR/monitoring/grafana/provisioning/datasources"
            mkdir -p "$APP_DIR/monitoring/grafana/provisioning/dashboards"
            mkdir -p "$APP_DIR/monitoring/grafana/dashboards"

            echo "Deploying branch: $BRANCH"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull --ff-only origin "$BRANCH"

            echo "Rebuilding and restarting backend stack"
            docker compose -f docker-compose.aws.yml --env-file .env.aws up -d --build

            echo "Current containers:"
            docker compose -f docker-compose.aws.yml ps

            echo "Waiting for backend health check"
            for attempt in $(seq 1 18); do
              if curl --silent --fail http://127.0.0.1:9090/api/health >/dev/null; then
                echo "Backend health check passed"
                exit 0
              fi

              echo "Health check not ready yet (attempt $attempt/18)"
              sleep 5
            done

            echo "Backend health check failed"
            docker compose -f docker-compose.aws.yml --env-file .env.aws logs app --tail 100
            exit 1
