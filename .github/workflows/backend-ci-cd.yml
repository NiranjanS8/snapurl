name: Backend CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - ".mvn/**"
      - "mvnw"
      - "mvnw.cmd"
      - "pom.xml"
      - "Dockerfile"
      - "docker-compose.aws.yml"
      - ".github/workflows/backend-ci-cd.yml"
      - "scripts/deploy-backend-ec2.sh"
      - "BACKEND_CICD.md"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - ".mvn/**"
      - "mvnw"
      - "mvnw.cmd"
      - "pom.xml"
      - "Dockerfile"
      - "docker-compose.aws.yml"
      - ".github/workflows/backend-ci-cd.yml"
      - "scripts/deploy-backend-ec2.sh"
      - "BACKEND_CICD.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run Maven tests
        run: ./mvnw test

  deploy:
    name: Deploy Backend To EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy deploy script to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "scripts/deploy-backend-ec2.sh"
          target: "/tmp/snapurl-github-actions"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: EC2_APP_DIR,DEPLOY_BRANCH
          script: |
            chmod +x /tmp/snapurl-github-actions/scripts/deploy-backend-ec2.sh
            /tmp/snapurl-github-actions/scripts/deploy-backend-ec2.sh "$EC2_APP_DIR" "$DEPLOY_BRANCH"
