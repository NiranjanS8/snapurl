spring.application.name=snapurl
server.port=9090
spring.output.ansi.enabled=ALWAYS

# Database -> //MySql
spring.datasource.url=jdbc:mysql://localhost:3306/snap_url             
spring.datasource.username=root
spring.datasource.password=admin@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

jwt.secret=eiOEOFGmQ3jpgqOqX3mDjQznPYP/+o4/yBR/bfop2ug=
jwt.expiration=3600000

# Redis redirect cache
snapurl.redis.enabled=true
spring.data.redis.host=localhost
spring.data.redis.port=6399
snapurl.redis.redirect-cache-ttl-minutes=60
snapurl.redis.analytics-cache-ttl-seconds=60

# Redis rate limiting
snapurl.rate-limit.enabled=true
snapurl.rate-limit.public-shorten-per-minute=3
snapurl.rate-limit.auth-shorten-per-minute=3
snapurl.rate-limit.fail-open=true
snapurl.rate-limit.trust-forwarded-header=false

# RabbitMQ analytics
snapurl.analytics.async-enabled=true
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
snapurl.rabbitmq.analytics-exchange=snapurl.analytics
snapurl.rabbitmq.click-queue=click-events
snapurl.rabbitmq.click-routing-key=click.created
snapurl.rabbitmq.click-dlq=click-events-dlq
snapurl.rabbitmq.click-dlq-routing-key=click.created.dlq
