spring.application.name=snapurl
server.port=9090
spring.output.ansi.enabled=ALWAYS
spring.config.import=optional:file:.env[.properties]
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.snapurl=${LOG_LEVEL_APP:INFO}
springdoc.swagger-ui.path=/swagger-ui.html

management.server.port=${MANAGEMENT_SERVER_PORT:9091}
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}

# Database -> //MySql
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/snap_url}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:}
jwt.expiration=3600000
jwt.refresh-expiration=604800000
snapurl.auth.password-reset-expiration-minutes=30
snapurl.auth.max-failed-login-attempts=${MAX_FAILED_LOGIN_ATTEMPTS:5}
snapurl.auth.account-lock-minutes=${ACCOUNT_LOCK_MINUTES:15}

snapurl.mail.enabled=${MAIL_ENABLED:false}
snapurl.mail.from=${MAIL_FROM:}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
snapurl.auth.expose-reset-token=${EXPOSE_RESET_CODE:false}
snapurl.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}


# Redis redirect cache
snapurl.redis.enabled=true
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6399}
snapurl.redis.redirect-cache-ttl-minutes=60
snapurl.redis.redirect-miss-cache-seconds=30
snapurl.redis.analytics-cache-ttl-seconds=60

# Redis rate limiting
snapurl.rate-limit.enabled=true
snapurl.rate-limit.public-shorten-per-minute=5
snapurl.rate-limit.auth-shorten-per-minute=30
snapurl.rate-limit.login-per-15-minutes=5
snapurl.rate-limit.register-per-hour=5
snapurl.rate-limit.refresh-per-15-minutes=30
snapurl.rate-limit.forgot-password-per-hour=5
snapurl.rate-limit.reset-password-per-hour=10
snapurl.rate-limit.fail-open=${RATE_LIMIT_FAIL_OPEN:false}
snapurl.rate-limit.trust-forwarded-header=false

# RabbitMQ analytics
snapurl.analytics.async-enabled=true
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
snapurl.rabbitmq.analytics-exchange=snapurl.analytics
snapurl.rabbitmq.click-queue=click-events
snapurl.rabbitmq.click-routing-key=click.created
snapurl.rabbitmq.click-dlq=click-events-dlq
snapurl.rabbitmq.click-dlq-routing-key=click.created.dlq
snapurl.rabbitmq.listener-max-attempts=3
snapurl.rabbitmq.listener-initial-interval-ms=1000
snapurl.rabbitmq.listener-multiplier=2.0
snapurl.rabbitmq.listener-max-interval-ms=5000
